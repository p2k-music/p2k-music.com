services:
  - type: web
    name: p2k-music
    runtime: node
    plan: starter            # persistent disk requires a paid instance (~US$7/mo)
    buildCommand: ""         # zero dependencies — nothing to install or build
    startCommand: node server/server.js
    healthCheckPath: /api/health
    disk:
      name: p2k-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: DATA_DIR
        value: /data
      - key: BEHIND_TLS       # Render terminates HTTPS in front of us
        value: "true"
      - key: TRUST_PROXY      # honour X-Forwarded-For from Render's proxy
        value: "true"
      # Secrets — set these in the Render dashboard (sync: false keeps them out of git):
      - key: ADMIN1_PASS
        sync: false
      - key: ADMIN2_PASS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: production
      - key: PAYPAL_WEBHOOK_ID
        sync: false

